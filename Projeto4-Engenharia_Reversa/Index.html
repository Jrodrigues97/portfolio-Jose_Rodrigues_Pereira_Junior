<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphism Generator Clone</title>
    <link rel="stylesheet" href="css/style.css">
    
<body>
    <!-- Cabeçalho -->
    <header>
        <h1>Neumorphism<span>.io</span> Clone</h1>
    </header>

    <!-- Container Principal (2 Colunas) -->
    <main class="container">
        
        <!-- Coluna Esquerda: Visualização do Objeto -->
        <section class="preview-section">
            <div class="shape" id="preview-shape"></div>
        </section>

        <!-- Coluna Direita: Painel de Controles -->
        <section class="controls-section" id="controls-panel">
            
            <!-- Cor -->
            <div class="control-group">
                <label for="color-picker">Cor Base (Hex):</label>
                <div class="color-input-wrapper">
                    <input type="color" id="color-picker" value="#e0e5ec">
                    <input type="text" id="color-hex" value="#e0e5ec" maxlength="7">
                </div>
            </div>

            <!-- Direção da Luz -->
            <div class="control-group">
                <label>Direção da Luz:</label>
                <div class="light-direction-grid">
                    <button class="light-btn active" data-x="-1" data-y="-1" aria-label="Top Left"></button>
                    <button class="light-btn" data-x="1" data-y="-1" aria-label="Top Right"></button>
                    <button class="light-btn" data-x="-1" data-y="1" aria-label="Bottom Left"></button>
                    <button class="light-btn" data-x="1" data-y="1" aria-label="Bottom Right"></button>
                </div>
            </div>

            <!-- Sliders -->
            <div class="control-group">
                <div class="label-row">
                    <label for="size">Size</label>
                    <span class="val-display" id="size-val">250</span>
                </div>
                <input type="range" id="size" min="10" max="400" value="250">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <label for="radius">Radius</label>
                    <span class="val-display" id="radius-val">50</span>
                </div>
                <input type="range" id="radius" min="0" max="200" value="50">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <label for="distance">Distance</label>
                    <span class="val-display" id="distance-val">20</span>
                </div>
                <input type="range" id="distance" min="5" max="50" value="20">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <label for="intensity">Intensity</label>
                    <span class="val-display" id="intensity-val">0.15</span>
                </div>
                <input type="range" id="intensity" min="0.01" max="0.6" step="0.01" value="0.15">
            </div>

        </section>

    </main>

    <!-- Área Inferior: Código CSS Gerado -->
    <section class="code-section">
        <div class="code-box">
            <pre><code id="css-output">/* O código CSS gerado aparecerá aqui */</code></pre>
            <button id="copy-btn" class="btn-neumorphic">Copiar</button>
        </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
